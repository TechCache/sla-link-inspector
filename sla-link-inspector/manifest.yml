app:
  id: ari:cloud:ecosystem::app/your-app-id-here

runtime:
  name: nodejs20.x

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - read:jira-service-management-request

modules:
  jira:issuePanel:
    - key: sla-link-panel
      function: main
      title: SLA Link Inspector
      icon: https://avatars.githubusercontent.com/u/214186582?v=4

functions:
  main:
    handler: index.run
