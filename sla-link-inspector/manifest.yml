app:
  id: ari:cloud:ecosystem::app/cc8c3263-9d15-4454-9954-8bfdba52c1f4
  runtime:
    name: nodejs20.x

permissions:
  external:
    fetch:
      backend:
        - "*.atlassian.net"
  content: {}
  scopes:
    - read:jira-work
    - read:jira-user
    - write:jira-work
    - storage:app

modules:
  jira:issuePanel:
    - key: sla-link-inspector-panel
      title: SLA Link Inspector
      icon: https://avatars.githubusercontent.com/u/214186582?v=4
      resource: sla-ui
      resolver:
        function: resolver

  function:
    - key: resolver
      handler: resolvers/resolver.handler

resources:
  - key: sla-ui
    path: src/frontend
