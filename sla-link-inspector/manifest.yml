app:
  id: ari:cloud:ecosystem::app/your-app-id-here

runtime:
  name: nodejs20.x

permissions:
  scopes:
    - read:jira-work
    - read:jira-user

modules:
  jira:issuePanel:
    - key: sla-link-panel
      resource: main
      resolver: resolver
      title: SLA Link Inspector
      icon: https://avatars.githubusercontent.com/u/214186582?v=4

resources:
  - key: main
    path: static/  # Use 'static/' if using Custom UI, otherwise omit

function:
  key: resolver
  handler: index.run

