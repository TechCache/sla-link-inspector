app:
  id: ari:cloud:ecosystem::app/<YOUR-APP-ID>

runtime:
  name: nodejs20.x

modules:
  jira:issuePanel:
    - key: sla-link-panel
      function: main
      title: SLA Link Inspector
      icon: https://avatars.githubusercontent.com/u/214186582?v=4

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - read:jira-service-management-request

functions:
  main:
    handler: index.run