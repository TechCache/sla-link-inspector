app:
  id: ari:cloud:ecosystem::app/875126f5-5997-4d13-bf50-097ce475cee5
  runtime:
    name: nodejs20.x

permissions:
  external:
    fetch:
      backend:
        - address: "*.atlassian.net"
        - address: "hooks.slack.com"
        - address: "slack.com"
        - address: "hooks.zapier.com"
        - address: "hook.eu1.make.com"
        - address: "hook.us1.make.com"
  content: {}
  scopes:
    - read:jira-work
    - read:jira-user
    - write:jira-work
    - storage:app
    # Required to read SLA from Jira Service Management (e.g. "Time to resolution") when not in issue fields
    - read:request.sla:jira-service-management

modules:
  jira:issuePanel:
    - key: sla-link-inspector-panel
      title: Linked SLA Alerts
      icon: https://avatars.githubusercontent.com/u/214186582?v=4
      resource: sla-ui-v2
      resolver:
        function: resolver

  jira:adminPage:
    - key: sla-link-inspector-configure
      resource: admin-ui
      title: Linked SLA Alerts
      resolver:
        function: resolver
      useAsConfig: true

  function:
    - key: resolver
      handler: resolvers/resolver.handler

resources:
  - key: sla-ui
    path: src/frontend
  - key: sla-ui-v2
    path: src/frontend
  - key: admin-ui
    path: src/admin
