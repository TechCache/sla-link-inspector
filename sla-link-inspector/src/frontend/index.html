<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SLA Link Inspector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <p class="version-banner" id="version-banner">SLA Link Inspector • Ticket | Priority | Status | SLA</p>
    <h1>SLA Link Inspector</h1>
    <p class="subtitle">SLA status for linked issues</p>

    <div id="loading" class="state-message">
      Loading linked issues…
    </div>

    <div id="error" class="state-message error" style="display: none;"></div>
    <div id="empty" class="state-message empty" style="display: none;">
      No linked issues returned for this ticket. The panel shows standard Jira issue links only.
    </div>

    <div id="sla-summary" class="sla-summary" style="display: none;"></div>

    <table id="sla-table" style="display: none;">
      <thead>
        <tr id="sla-table-head"></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <script src="build/main.js?v=1773277413677"></script>
</body>
</html>
