<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Linked SLA Alerts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="license-banner" class="license-banner" style="display: none;" role="alert"></div>

    <div id="loading" class="state-message">
      Checking for linked tickets…
    </div>

    <div id="error" class="state-message error" style="display: none;"></div>

    <div id="panel-main" class="panel-main" style="display: none;">
      <div id="sla-status-block" class="sla-status-block"></div>
      <div id="sla-summary" class="sla-summary-wrap"></div>
      <div id="sla-send-section" class="sla-send-section"></div>
      <div id="slack-self-link-section" class="slack-self-link-section" hidden></div>
    </div>

    <footer class="panel-footer">
      <a href="#" id="panel-admin-link" class="panel-admin-link">Configure app</a>
      <p class="panel-version" id="version-banner"></p>
    </footer>
  </div>
  <script src="build/main.js?v=1773961707101"></script>
</body>
</html>
