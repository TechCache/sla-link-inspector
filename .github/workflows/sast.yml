name: SAST

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  eslint-sast:
    name: ESLint SAST
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sla-link-inspector

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sla-link-inspector/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run static analysis
        run: npm run scan:sast
