# manifest.yml
app:
  id: ari:cloud:ecosystem::app/<APP-ID>
  name: SLA Link Inspector

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - read:jira-service-management-request

modules:
  jira:issuePanel:
    - key: sla-link-panel
      function: main
      title: Linked SLA Status
      icon: https://your-logo-url/icon.png

functions:
  main:
    handler: index.run
